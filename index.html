<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RobEng — Английский в Roblox для детей 7-11 лет</title>
<meta name="description" content="RobEng — школа разговорного английского внутри Roblox для детей 7-11 лет. Онлайн по всему Казахстану. Алматы, Астана.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root {
  --orange: #F57C00;
  --orange-light: #FF9800;
  --orange-bg: #FFF3E0;
  --green: #4CAF50;
  --green-dark: #388E3C;
  --green-bg: #E8F5E9;
  --dark: #1A1A2E;
  --text: #2c2c3a;
  --text2: #5a5a72;
  --border: #E8E8F0;
  --bg: #FFFFFF;
  --bg2: #F8F9FF;
  --bg3: #F2F3FA;
  --red: #E53935;
  --wa: #25d366;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "Nunito", sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow-x: hidden;
}

/* NAV */
.nav {
  background: white;
  border-bottom: 1px solid var(--border);
  padding: 12px 0;
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
}
.nav .inner {
  max-width: 1100px; margin: 0 auto; padding: 0 24px;
  display: flex; justify-content: space-between; align-items: center;
}
.nav-logo img { height: 38px; }
.lang-btns button {
  background: none;
  border: 1.5px solid var(--border);
  color: var(--text2);
  padding: 5px 14px;
  border-radius: 20px;
  cursor: pointer;
  font-family: "Nunito", sans-serif;
  font-weight: 800;
  font-size: 0.82rem;
  transition: all 0.2s;
  margin-left: 6px;
}
.lang-btns button.active {
  background: var(--orange);
  border-color: var(--orange);
  color: white;
}

/* HERO */
.hero {
  background: linear-gradient(135deg, #FFFDE7 0%, #FFF8F0 40%, #F3F8FF 100%);
  padding: 70px 0 80px;
  position: relative;
  overflow: hidden;
}
.hero::before {
  content: "";
  position: absolute;
  top: -60px; right: -60px;
  width: 400px; height: 400px;
  background: radial-gradient(circle, rgba(245,124,0,0.08), transparent 70%);
  border-radius: 50%;
}
.hero::after {
  content: "";
  position: absolute;
  bottom: -40px; left: -40px;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(76,175,80,0.08), transparent 70%);
  border-radius: 50%;
}
.hero .inner {
  max-width: 1100px; margin: 0 auto; padding: 0 24px;
  display: grid; grid-template-columns: 1fr 400px; gap: 60px; align-items: center;
  position: relative; z-index: 2;
}

.badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: var(--orange-bg);
  border: 1.5px solid rgba(245,124,0,0.25);
  color: var(--orange);
  padding: 6px 16px; border-radius: 30px;
  font-weight: 800; font-size: 0.78rem; letter-spacing: 0.5px;
  text-transform: uppercase; margin-bottom: 18px;
}
.badge .dot {
  width: 7px; height: 7px; background: var(--orange);
  border-radius: 50%; animation: blink 1.5s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

h1 {
  font-family: "Fredoka One", cursive;
  font-size: clamp(2rem, 4.5vw, 3.2rem);
  line-height: 1.15; margin-bottom: 18px; color: var(--dark);
}
h1 .acc-orange { color: var(--orange); }
h1 .acc-green { color: var(--green-dark); }

.hero-sub {
  font-size: 1.05rem; color: var(--text2);
  line-height: 1.75; margin-bottom: 28px; max-width: 520px;
}

.hero-pills {
  display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 32px;
}
.pill {
  background: white;
  border: 1.5px solid var(--border);
  padding: 6px 14px; border-radius: 20px;
  font-size: 0.83rem; font-weight: 700; color: var(--text);
  display: flex; align-items: center; gap: 6px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.05);
}
.pill.green { border-color: rgba(76,175,80,0.3); background: var(--green-bg); color: var(--green-dark); }
.pill.orange { border-color: rgba(245,124,0,0.3); background: var(--orange-bg); color: var(--orange); }

/* FORM CARD */
.form-card {
  background: white;
  border: 1.5px solid var(--border);
  border-radius: 24px;
  padding: 36px 32px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.1), 0 4px 16px rgba(245,124,0,0.08);
  position: relative;
}
.form-card::before {
  content: "";
  position: absolute; top: 0; left: 24px; right: 24px; height: 4px;
  background: linear-gradient(90deg, var(--orange), var(--green));
  border-radius: 0 0 4px 4px;
}
.form-card h2 {
  font-family: "Fredoka One", cursive;
  font-size: 1.45rem; margin-bottom: 6px; color: var(--dark);
}
.price-line { font-size: 0.85rem; color: var(--text2); margin-bottom: 22px; }
.price-line strong { color: var(--green-dark); }

.form-group { margin-bottom: 12px; }
.form-group label {
  display: block; font-size: 0.78rem; font-weight: 800;
  color: var(--text2); margin-bottom: 5px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.form-group input, .form-group select {
  width: 100%; padding: 12px 16px;
  background: var(--bg2); border: 1.5px solid var(--border);
  border-radius: 12px; color: var(--text);
  font-family: "Nunito", sans-serif; font-size: 0.95rem; font-weight: 600;
  transition: border-color 0.2s; outline: none;
}
.form-group input:focus, .form-group select:focus {
  border-color: var(--orange); background: white;
}

.btn-primary {
  width: 100%; padding: 15px;
  background: linear-gradient(135deg, var(--orange), var(--orange-light));
  border: none; border-radius: 14px;
  color: white; font-family: "Fredoka One", cursive;
  font-size: 1.1rem; cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 6px 24px rgba(245,124,0,0.35);
  margin-top: 8px;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(245,124,0,0.45); }
.btn-primary:active { transform: translateY(0); }
.btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }

.form-note { font-size: 0.75rem; color: var(--text2); text-align: center; margin-top: 10px; }

/* STATS */
.stats-bar {
  background: var(--dark);
  padding: 32px 0;
}
.stats-bar .inner {
  max-width: 1100px; margin: 0 auto; padding: 0 24px;
  display: flex; justify-content: space-around; flex-wrap: wrap; gap: 20px;
}
.stat { text-align: center; }
.stat .num {
  font-family: "Fredoka One", cursive; font-size: 2.1rem; color: var(--orange-light);
}
.stat .lbl { font-size: 0.78rem; color: rgba(255,255,255,0.6); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

/* SECTIONS */
section { padding: 80px 0; }
.inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

.section-label {
  font-size: 0.72rem; font-weight: 800; letter-spacing: 2px;
  text-transform: uppercase; color: var(--orange); margin-bottom: 10px;
}
.section-title {
  font-family: "Fredoka One", cursive;
  font-size: clamp(1.7rem, 3.5vw, 2.6rem);
  line-height: 1.2; margin-bottom: 14px; color: var(--dark);
}
.section-sub { color: var(--text2); font-size: 1rem; line-height: 1.75; max-width: 600px; }

/* PAIN */
.pain-section { background: var(--bg2); }
.pain-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 20px; margin-top: 48px;
}
.pain-card {
  background: white; border: 1.5px solid var(--border);
  border-radius: 16px; padding: 28px 24px;
  position: relative; overflow: hidden;
  box-shadow: 0 4px 16px rgba(0,0,0,0.05);
}
.pain-card::before {
  content: "✕";
  position: absolute; top: 14px; right: 16px;
  font-size: 0.9rem; color: var(--red); font-weight: 900;
}
.pain-card .emoji { font-size: 2rem; margin-bottom: 14px; }
.pain-card h3 { font-size: 0.97rem; font-weight: 800; margin-bottom: 8px; color: var(--dark); }
.pain-card p { font-size: 0.85rem; color: var(--text2); line-height: 1.65; }

/* STEPS */
.steps {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 24px; margin-top: 48px;
}
.step {
  background: white; border: 1.5px solid var(--border);
  border-radius: 20px; padding: 30px 24px;
  position: relative;
  transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
  box-shadow: 0 4px 16px rgba(0,0,0,0.04);
}
.step:hover { transform: translateY(-4px); border-color: var(--orange); box-shadow: 0 12px 32px rgba(245,124,0,0.12); }
.step-num {
  font-family: "Fredoka One", cursive; font-size: 3rem;
  color: rgba(245,124,0,0.1); position: absolute; top: 14px; right: 18px;
}
.step-icon { font-size: 2.2rem; margin-bottom: 16px; }
.step h3 { font-size: 1rem; font-weight: 800; margin-bottom: 10px; color: var(--dark); }
.step p { font-size: 0.85rem; color: var(--text2); line-height: 1.65; }

/* WHY */
.why-section { background: var(--bg2); }
.why-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr));
  gap: 20px; margin-top: 48px;
}
.why-card {
  background: white; border: 1.5px solid var(--border);
  border-radius: 20px; padding: 28px;
  display: flex; gap: 18px; align-items: flex-start;
  box-shadow: 0 4px 16px rgba(0,0,0,0.04);
}
.why-icon {
  width: 48px; height: 48px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem; flex-shrink: 0;
}
.why-icon.o { background: var(--orange-bg); }
.why-icon.g { background: var(--green-bg); }
.why-card h3 { font-size: 0.97rem; font-weight: 800; margin-bottom: 6px; color: var(--dark); }
.why-card p { font-size: 0.84rem; color: var(--text2); line-height: 1.65; }

/* GEO STRIP */
.geo-strip {
  background: linear-gradient(135deg, var(--orange-bg), var(--green-bg));
  border-top: 1px solid rgba(245,124,0,0.15);
  border-bottom: 1px solid rgba(76,175,80,0.15);
  padding: 24px 0;
}
.geo-strip .inner {
  display: flex; align-items: center; justify-content: center;
  gap: 32px; flex-wrap: wrap;
}
.geo-item {
  display: flex; align-items: center; gap: 10px;
  font-weight: 800; font-size: 0.95rem; color: var(--dark);
}
.geo-item .icon {
  width: 36px; height: 36px; border-radius: 50%;
  background: white; display: flex; align-items: center;
  justify-content: center; font-size: 1.1rem;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
.geo-divider { color: var(--text2); font-size: 1.2rem; }

/* REVIEWS */
.reviews-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px; margin-top: 48px;
}
.review {
  background: white; border: 1.5px solid var(--border);
  border-radius: 20px; padding: 28px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.04);
}
.review-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
.avatar {
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.2rem; font-weight: 900; flex-shrink: 0; color: white;
}
.a1 { background: linear-gradient(135deg, var(--orange), #FF7043); }
.a2 { background: linear-gradient(135deg, var(--green), #00897B); }
.a3 { background: linear-gradient(135deg, #5C6BC0, #7E57C2); }
.review-name { font-weight: 800; font-size: 0.95rem; color: var(--dark); }
.review-role { font-size: 0.78rem; color: var(--text2); }
.stars { color: var(--orange); letter-spacing: 2px; font-size: 0.9rem; margin-bottom: 12px; }
.review p { font-size: 0.87rem; color: var(--text2); line-height: 1.7; font-style: italic; }

/* CTA */
.cta-section {
  background: linear-gradient(135deg, var(--dark) 0%, #16213E 100%);
  text-align: center; color: white;
}
.cta-box { max-width: 620px; margin: 0 auto; }
.cta-box h2 {
  font-family: "Fredoka One", cursive;
  font-size: clamp(1.8rem, 4vw, 2.6rem); margin-bottom: 16px;
}
.cta-box p { color: rgba(255,255,255,0.7); margin-bottom: 36px; font-size: 1rem; line-height: 1.75; }
.cta-btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
.btn-wa {
  display: inline-flex; align-items: center; gap: 10px;
  background: var(--wa); color: white;
  padding: 15px 28px; border-radius: 14px;
  font-family: "Fredoka One", cursive; font-size: 1.05rem;
  text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 6px 24px rgba(37,211,102,0.4);
}
.btn-wa:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(37,211,102,0.5); }
.btn-scroll {
  display: inline-flex; align-items: center; gap: 10px;
  background: rgba(255,255,255,0.1); border: 1.5px solid rgba(255,255,255,0.2);
  color: white; padding: 15px 28px; border-radius: 14px;
  font-family: "Fredoka One", cursive; font-size: 1.05rem;
  cursor: pointer; transition: background 0.2s;
}
.btn-scroll:hover { background: rgba(255,255,255,0.18); }

/* FAQ */
.faq-section { background: var(--bg2); }
.faq-list { margin-top: 48px; max-width: 720px; }
.faq-item {
  background: white; border: 1.5px solid var(--border);
  border-radius: 14px; margin-bottom: 10px;
  overflow: hidden;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.faq-q {
  font-weight: 800; font-size: 0.97rem; cursor: pointer;
  display: flex; justify-content: space-between; align-items: center;
  gap: 16px; user-select: none; padding: 18px 22px;
  color: var(--dark);
}
.faq-q .arrow { color: var(--orange); font-size: 1.1rem; transition: transform 0.2s; flex-shrink: 0; }
.faq-item.open .faq-q .arrow { transform: rotate(180deg); }
.faq-a {
  font-size: 0.87rem; color: var(--text2); line-height: 1.7;
  max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s;
  padding: 0 22px;
}
.faq-item.open .faq-a { max-height: 200px; padding: 0 22px 18px; }

/* FOOTER */
footer {
  background: white; border-top: 1px solid var(--border);
  padding: 32px 0; text-align: center;
}
footer img { height: 38px; margin-bottom: 10px; }
footer p { font-size: 0.78rem; color: var(--text2); }

/* FLOAT WA */
.wa-float {
  position: fixed; bottom: 24px; right: 24px; z-index: 99;
  width: 56px; height: 56px; background: var(--wa);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 1.7rem; text-decoration: none;
  box-shadow: 0 6px 24px rgba(37,211,102,0.5);
  animation: pulse 2.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{box-shadow:0 6px 24px rgba(37,211,102,0.5)} 50%{box-shadow:0 6px 40px rgba(37,211,102,0.75)} }

/* SUCCESS */
.success-msg { display: none; text-align: center; padding: 20px 0; }
.success-msg .big { font-size: 3rem; margin-bottom: 10px; }
.success-msg h3 { font-family: "Fredoka One", cursive; font-size: 1.4rem; color: var(--green-dark); margin-bottom: 8px; }
.success-msg p { font-size: 0.87rem; color: var(--text2); }

@media (max-width: 768px) {
  .hero .inner { grid-template-columns: 1fr; gap: 40px; }
  .form-card { padding: 28px 20px; }
  .stats-bar .inner { justify-content: center; }
  .geo-strip .inner { flex-direction: column; gap: 16px; }
  .geo-divider { display: none; }
}
</style>
</head>

<script>
// Phone mask
document.addEventListener("DOMContentLoaded", function() {
  const phone = document.getElementById("f-phone");
  phone.addEventListener("input", function(e) {
    let val = e.target.value.replace(/\D/g, "");
    if (val.startsWith("8")) val = "7" + val.slice(1);
    if (!val.startsWith("7")) val = "7" + val;
    val = val.slice(0, 11);
    let result = "+7";
    if (val.length > 1) result += " (" + val.slice(1, 4);
    if (val.length >= 4) result += ") " + val.slice(4, 7);
    if (val.length >= 7) result += "-" + val.slice(7, 9);
    if (val.length >= 9) result += "-" + val.slice(9, 11);
    e.target.value = result;
  });
  phone.addEventListener("keydown", function(e) {
    if (e.key === "Backspace" && e.target.value === "+7") e.preventDefault();
  });
  phone.addEventListener("focus", function() {
    if (!this.value) this.value = "+7 ";
  });
});

let currentLang = "ru";

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll("[data-ru]").forEach(el => {
    const text = el.getAttribute("data-" + lang);
    if (text) el.innerHTML = text;
  });
  document.querySelectorAll(".lang-btns button").forEach((btn, i) => {
    btn.classList.toggle("active", (i === 0 && lang === "ru") || (i === 1 && lang === "kz"));
  });
}

function toggleFaq(el) {
  el.parentElement.classList.toggle("open");
}

async function submitForm() {

  const phone = document.getElementById("f-phone").value.trim();
  const age = document.getElementById("f-age").value;

  if (!name || !phone || !age) {

    return;

  const btn = document.getElementById("submit-btn");
  btn.disabled = true;
  btn.textContent = currentLang === "ru" ? "Отправляем..." : "Жіберілуде...";

    method: "POST",

  document.getElementById("form-content").style.display = "none";
