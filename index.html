<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELC Kids — Английский в Roblox</title>
<meta name="description" content="Школа английского языка внутри Roblox для детей 7-11 лет. Ребёнок сам захочет на урок! Алматы.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">

<style>
:root {
  --red: #e8294a;
  --yellow: #ffd94a;
  --blue: #00b4ff;
  --dark: #0d0d1a;
  --dark2: #13132b;
  --dark3: #1a1a38;
  --white: #f0f4ff;
  --gray: #8888aa;
  --green: #2ecc71;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Nunito', sans-serif;
  background: var(--dark);
  color: var(--white);
  overflow-x: hidden;
}

/* LANG SWITCHER */
.lang-bar {
  background: var(--dark2);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  padding: 10px 0;
  text-align: right;
}
.lang-bar .inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; display: flex; justify-content: space-between; align-items: center; }
.lang-bar .logo-top { font-family: 'Fredoka One', cursive; font-size: 1.2rem; color: var(--yellow); letter-spacing: 1px; }
.lang-btns button {
  background: none;
  border: 1.5px solid rgba(255,255,255,0.15);
  color: var(--gray);
  padding: 4px 14px;
  border-radius: 20px;
  cursor: pointer;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 0.85rem;
  transition: all 0.2s;
  margin-left: 6px;
}
.lang-btns button.active {
  background: var(--yellow);
  border-color: var(--yellow);
  color: var(--dark);
}

/* HERO */
.hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  align-items: center;
  overflow: hidden;
  padding: 60px 0 80px;
}
.hero-bg {
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at 70% 50%, rgba(0,180,255,0.12) 0%, transparent 60%),
              radial-gradient(ellipse at 20% 80%, rgba(232,41,74,0.15) 0%, transparent 50%),
              var(--dark);
}
.pixels {
  position: absolute; inset: 0; pointer-events: none;
  background-image:
    radial-gradient(circle, rgba(255,217,74,0.4) 1px, transparent 1px),
    radial-gradient(circle, rgba(0,180,255,0.3) 1px, transparent 1px);
  background-size: 60px 60px, 90px 90px;
  background-position: 0 0, 30px 30px;
  opacity: 0.3;
  animation: floatPixels 20s linear infinite;
}
@keyframes floatPixels { 0%{transform:translateY(0)} 100%{transform:translateY(-60px)} }

.hero .inner {
  max-width: 1100px; margin: 0 auto; padding: 0 24px;
  display: grid; grid-template-columns: 1fr 420px; gap: 60px; align-items: center;
  position: relative; z-index: 2;
}

.badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,217,74,0.12);
  border: 1px solid rgba(255,217,74,0.3);
  color: var(--yellow);
  padding: 6px 16px; border-radius: 30px;
  font-weight: 800; font-size: 0.8rem; letter-spacing: 0.5px;
  text-transform: uppercase; margin-bottom: 20px;
}
.badge .dot { width: 8px; height: 8px; background: var(--yellow); border-radius: 50%; animation: blink 1.5s ease-in-out infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

h1 {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(2.2rem, 5vw, 3.6rem);
  line-height: 1.1;
  margin-bottom: 20px;
}
h1 .accent { color: var(--yellow); }
h1 .accent2 { color: var(--blue); }

.hero-sub {
  font-size: 1.1rem; color: rgba(240,244,255,0.75);
  line-height: 1.7; margin-bottom: 30px; max-width: 520px;
}

.hero-badges {
  display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 36px;
}
.pill {
  background: var(--dark3);
  border: 1px solid rgba(255,255,255,0.1);
  padding: 6px 14px; border-radius: 20px;
  font-size: 0.85rem; font-weight: 700;
  display: flex; align-items: center; gap: 6px;
}

/* LEAD FORM CARD */
.form-card {
  background: var(--dark2);
  border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  padding: 36px 32px;
  box-shadow: 0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,217,74,0.05);
  position: relative;
}
.form-card::before {
  content: '';
  position: absolute; top: -1px; left: 24px; right: 24px; height: 3px;
  background: linear-gradient(90deg, var(--red), var(--yellow), var(--blue));
  border-radius: 0 0 3px 3px;
}
.form-card h2 {
  font-family: 'Fredoka One', cursive;
  font-size: 1.5rem; margin-bottom: 6px;
}
.form-card .price-line {
  font-size: 0.85rem; color: var(--gray); margin-bottom: 24px;
}
.form-card .price-line strong { color: var(--green); }

.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 0.8rem; font-weight: 700; color: var(--gray); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
.form-group input, .form-group select {
  width: 100%; padding: 13px 16px;
  background: var(--dark3); border: 1.5px solid rgba(255,255,255,0.08);
  border-radius: 12px; color: var(--white);
  font-family: 'Nunito', sans-serif; font-size: 0.95rem; font-weight: 600;
  transition: border-color 0.2s;
  outline: none;
}
.form-group input:focus, .form-group select:focus { border-color: var(--yellow); }
.form-group select option { background: var(--dark2); }

.btn-primary {
  width: 100%; padding: 16px;
  background: linear-gradient(135deg, var(--red), #ff6b35);
  border: none; border-radius: 14px;
  color: white; font-family: 'Fredoka One', cursive;
  font-size: 1.1rem; cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 8px 30px rgba(232,41,74,0.4);
  margin-top: 6px;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(232,41,74,0.5); }
.btn-primary:active { transform: translateY(0); }

.form-note { font-size: 0.75rem; color: var(--gray); text-align: center; margin-top: 12px; }

/* SOCIAL PROOF */
.stats-bar {
  background: var(--dark2);
  border-top: 1px solid rgba(255,255,255,0.05);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  padding: 28px 0;
}
.stats-bar .inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; display: flex; justify-content: space-around; flex-wrap: wrap; gap: 20px; }
.stat { text-align: center; }
.stat .num { font-family: 'Fredoka One', cursive; font-size: 2rem; color: var(--yellow); }
.stat .lbl { font-size: 0.8rem; color: var(--gray); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }

/* SECTIONS */
section { padding: 80px 0; }
.inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; }

.section-label {
  font-size: 0.75rem; font-weight: 800; letter-spacing: 2px;
  text-transform: uppercase; color: var(--blue); margin-bottom: 12px;
}
.section-title {
  font-family: 'Fredoka One', cursive;
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  line-height: 1.2; margin-bottom: 16px;
}
.section-sub { color: var(--gray); font-size: 1rem; line-height: 1.7; max-width: 600px; }

/* PAIN SECTION */
.pain-section { background: var(--dark2); }
.pain-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; margin-top: 48px; }
.pain-card {
  background: var(--dark3);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 16px; padding: 28px 24px;
  position: relative; overflow: hidden;
}
.pain-card::after {
  content: '✕';
  position: absolute; top: 16px; right: 16px;
  font-size: 1rem; color: var(--red); font-weight: 900;
}
.pain-card .emoji { font-size: 2rem; margin-bottom: 14px; }
.pain-card h3 { font-size: 1rem; font-weight: 800; margin-bottom: 8px; }
.pain-card p { font-size: 0.875rem; color: var(--gray); line-height: 1.6; }

/* HOW IT WORKS */
.steps { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 24px; margin-top: 48px; }
.step {
  background: var(--dark2);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 20px; padding: 32px 24px;
  position: relative;
  transition: transform 0.2s, border-color 0.2s;
}
.step:hover { transform: translateY(-4px); border-color: rgba(255,217,74,0.3); }
.step-num {
  font-family: 'Fredoka One', cursive; font-size: 3rem;
  color: rgba(255,217,74,0.15); position: absolute; top: 16px; right: 20px;
}
.step-icon { font-size: 2.2rem; margin-bottom: 16px; }
.step h3 { font-size: 1.05rem; font-weight: 800; margin-bottom: 10px; }
.step p { font-size: 0.875rem; color: var(--gray); line-height: 1.65; }

/* WHY US */
.why-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 48px; }
.why-card {
  background: linear-gradient(135deg, var(--dark2), var(--dark3));
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 20px; padding: 28px;
  display: flex; gap: 18px; align-items: flex-start;
}
.why-icon {
  width: 48px; height: 48px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.5rem; flex-shrink: 0;
}
.why-icon.red { background: rgba(232,41,74,0.15); }
.why-icon.blue { background: rgba(0,180,255,0.15); }
.why-icon.yellow { background: rgba(255,217,74,0.15); }
.why-icon.green { background: rgba(46,204,113,0.15); }
.why-card h3 { font-size: 1rem; font-weight: 800; margin-bottom: 6px; }
.why-card p { font-size: 0.85rem; color: var(--gray); line-height: 1.6; }

/* TESTIMONIALS */
.reviews-section { background: var(--dark2); }
.reviews-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 48px; }
.review {
  background: var(--dark3);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 20px; padding: 28px;
}
.review-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
.avatar {
  width: 44px; height: 44px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem; font-weight: 900;
  flex-shrink: 0;
}
.avatar.a1 { background: linear-gradient(135deg, #e8294a, #ff6b35); }
.avatar.a2 { background: linear-gradient(135deg, #00b4ff, #0066ff); }
.avatar.a3 { background: linear-gradient(135deg, #ffd94a, #ff9500); }
.review-name { font-weight: 800; font-size: 0.95rem; }
.review-role { font-size: 0.78rem; color: var(--gray); }
.stars { color: var(--yellow); letter-spacing: 2px; font-size: 0.9rem; margin-bottom: 12px; }
.review p { font-size: 0.875rem; color: rgba(240,244,255,0.8); line-height: 1.7; font-style: italic; }

/* CTA SECTION */
.cta-section {
  background: linear-gradient(135deg, var(--dark2), var(--dark3));
  border-top: 1px solid rgba(255,255,255,0.05);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  text-align: center;
}
.cta-box {
  max-width: 620px; margin: 0 auto;
}
.cta-box h2 { font-family: 'Fredoka One', cursive; font-size: clamp(1.8rem, 4vw, 2.6rem); margin-bottom: 16px; }
.cta-box p { color: var(--gray); margin-bottom: 36px; font-size: 1rem; line-height: 1.7; }
.cta-btns { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; }
.btn-wa {
  display: inline-flex; align-items: center; gap: 10px;
  background: #25d366; color: white;
  padding: 16px 28px; border-radius: 14px;
  font-family: 'Fredoka One', cursive; font-size: 1.05rem;
  text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s;
  box-shadow: 0 8px 24px rgba(37,211,102,0.35);
}
.btn-wa:hover { transform: translateY(-2px); box-shadow: 0 14px 32px rgba(37,211,102,0.45); }
.btn-scroll {
  display: inline-flex; align-items: center; gap: 10px;
  background: var(--dark); border: 1.5px solid rgba(255,255,255,0.12);
  color: var(--white);
  padding: 16px 28px; border-radius: 14px;
  font-family: 'Fredoka One', cursive; font-size: 1.05rem;
  cursor: pointer; transition: border-color 0.2s;
}
.btn-scroll:hover { border-color: var(--yellow); }

/* FAQ */
.faq-list { margin-top: 48px; max-width: 720px; }
.faq-item {
  border-bottom: 1px solid rgba(255,255,255,0.07);
  padding: 20px 0;
}
.faq-q {
  font-weight: 800; font-size: 1rem; cursor: pointer;
  display: flex; justify-content: space-between; align-items: center;
  gap: 16px; user-select: none;
}
.faq-q .arrow { color: var(--yellow); font-size: 1.2rem; transition: transform 0.2s; flex-shrink: 0; }
.faq-item.open .faq-q .arrow { transform: rotate(180deg); }
.faq-a { font-size: 0.875rem; color: var(--gray); line-height: 1.7; max-height: 0; overflow: hidden; transition: max-height 0.3s ease, padding 0.3s; }
.faq-item.open .faq-a { max-height: 200px; padding-top: 12px; }

/* FOOTER */
footer {
  background: var(--dark2);
  border-top: 1px solid rgba(255,255,255,0.05);
  padding: 36px 0; text-align: center;
}
footer .logo { font-family: 'Fredoka One', cursive; font-size: 1.5rem; color: var(--yellow); margin-bottom: 10px; }
footer p { font-size: 0.8rem; color: var(--gray); }

/* FLOATING WA */
.wa-float {
  position: fixed; bottom: 24px; right: 24px; z-index: 99;
  width: 58px; height: 58px; background: #25d366;
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 1.8rem; text-decoration: none;
  box-shadow: 0 8px 30px rgba(37,211,102,0.5);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{box-shadow:0 8px 30px rgba(37,211,102,0.5)} 50%{box-shadow:0 8px 50px rgba(37,211,102,0.8)} }

/* MOBILE */
@media (max-width: 768px) {
  .hero .inner { grid-template-columns: 1fr; gap: 40px; }
  .form-card { padding: 28px 20px; }
  .stats-bar .inner { justify-content: center; }
}

/* SUCCESS MESSAGE */
.success-msg {
  display: none; text-align: center; padding: 20px;
}
.success-msg .big { font-size: 3rem; margin-bottom: 10px; }
.success-msg h3 { font-family: 'Fredoka One', cursive; font-size: 1.4rem; color: var(--green); margin-bottom: 8px; }
.success-msg p { font-size: 0.875rem; color: var(--gray); }
</style>
</head>
<body>

<!-- LANG BAR -->
<div class="lang-bar">
  <div class="inner">
    <div class="logo-top">🎮 ELC Kids</div>
    <div class="lang-btns">
      <button class="active" onclick="setLang('ru')">RU</button>
      <button onclick="setLang('kz')">KZ</button>
    </div>
  </div>
</div>

<!-- HERO -->
<section class="hero">
  <div class="hero-bg"></div>
  <div class="pixels"></div>
  <div class="inner">
    <div class="hero-text">
      <div class="badge"><span class="dot"></span> <span data-ru="Первая в Казахстане" data-kz="Қазақстандағы алғашқы"></span></div>
      <h1>
        <span data-ru="Английский прямо" data-kz="Ағылшын тілі тікелей"></span><br>
        <span class="accent2" data-ru="внутри Roblox" data-kz="Roblox ішінде"></span> 🎮<br>
        <span class="accent" data-ru="для детей 7–11 лет" data-kz="7–11 жас балаларға"></span>
      </h1>
      <p class="hero-sub" data-ru="Ребёнок играет в любимую игру — и учит английский. Он сам будет просить вас записать его на урок." data-kz="Бала сүйікті ойынын ойнайды — және ағылшын тілін үйренеді. Ол өзі сабаққа жазылуды сұрайды."></p>
      <div class="hero-badges">
        <span class="pill">🎮 <span data-ru="Урок внутри игры" data-kz="Сабақ ойын ішінде"></span></span>
        <span class="pill">🇬🇧 <span data-ru="Разговорный English" data-kz="Сөйлеу ағылшынша"></span></span>
        <span class="pill">👾 <span data-ru="Дети сами хотят!" data-kz="Балалар өздері қалайды!"></span></span>
        <span class="pill">📍 <span data-ru="Алматы" data-kz="Алматы"></span></span>
      </div>
    </div>

    <!-- LEAD FORM -->
    <div class="form-card" id="lead-form-wrap">
      <h2 data-ru="🎯 Запись на пробный урок" data-kz="🎯 Сынақ сабаққа жазылу"></h2>
      <p class="price-line" data-ru="Пробный урок — <strong>5 000 тг</strong> · Курс от <strong>39 000 тг/мес</strong> (3×/нед)" data-kz="Сынақ сабақ — <strong>5 000 тг</strong> · Курс <strong>39 000 тг/ай</strong>-дан (аптасына 3×)"></p>

      <div id="form-content">
        <div class="form-group">
          <label data-ru="Ваше имя" data-kz="Сіздің атыңыз"></label>
          <input type="text" id="f-name" placeholder="Анна" autocomplete="off">
        </div>
        <div class="form-group">
          <label data-ru="Телефон (WhatsApp)" data-kz="Телефон (WhatsApp)"></label>
          <input type="tel" id="f-phone" placeholder="+7 777 000 00 00">
        </div>
        <div class="form-group">
          <label data-ru="Возраст ребёнка" data-kz="Баланың жасы"></label>
          <select id="f-age">
            <option value="" data-ru="Выберите возраст" data-kz="Жасты таңдаңыз"></option>
            <option value="7">7 лет</option>
            <option value="8">8 лет</option>
            <option value="9">9 лет</option>
            <option value="10">10 лет</option>
            <option value="11">11 лет</option>
          </select>
        </div>
        <button class="btn-primary" onclick="submitForm()" data-ru="🎮 Записаться на урок →" data-kz="🎮 Сабаққа жазылу →"></button>
        <p class="form-note" data-ru="Мы перезвоним в течение 30 минут" data-kz="Біз 30 минут ішінде қоңырау шаламыз"></p>
      </div>

      <div class="success-msg" id="success-msg">
        <div class="big">🎉</div>
        <h3 data-ru="Заявка принята!" data-kz="Өтінім қабылданды!"></h3>
        <p data-ru="Мы свяжемся с вами через WhatsApp в течение 30 минут." data-kz="Біз сізбен 30 минут ішінде WhatsApp арқылы байланысамыз."></p>
      </div>
    </div>
  </div>
</section>

<!-- STATS -->
<div class="stats-bar">
  <div class="inner">
    <div class="stat"><div class="num">200+</div><div class="lbl" data-ru="Учеников" data-kz="Оқушы"></div></div>
    <div class="stat"><div class="num">2 года</div><div class="lbl" data-ru="Опыта работы" data-kz="Тәжірибе"></div></div>
    <div class="stat"><div class="num">98%</div><div class="lbl" data-ru="Детей хотят ещё" data-kz="Балалар тағы қалайды"></div></div>
    <div class="stat"><div class="num">A1→B1</div><div class="lbl" data-ru="Прогресс за год" data-kz="1 жылдағы прогресс"></div></div>
  </div>
</div>

<!-- PAIN -->
<section class="pain-section">
  <div class="inner">
    <p class="section-label" data-ru="Знакомая ситуация?" data-kz="Таныс жағдай?"></p>
    <h2 class="section-title" data-ru="Почему обычные курсы не работают" data-kz="Неліктен кәдімгі курстар жұмыс істемейді"></h2>
    <div class="pain-grid">
      <div class="pain-card">
        <div class="emoji">😴</div>
        <h3 data-ru="Скучно и неинтересно" data-kz="Жалықтырушы және қызықсыз"></h3>
        <p data-ru="Ребёнок считает минуты до конца урока. Учёба ощущается как наказание." data-kz="Бала сабақтың аяқталуын санайды. Оқу жаза сияқты сезіледі."></p>
      </div>
      <div class="pain-card">
        <div class="emoji">🗣️</div>
        <h3 data-ru="Грамматика без практики" data-kz="Тәжірибесіз грамматика"></h3>
        <p data-ru="Учат правила, но говорить стесняется. Нет живого общения на языке." data-kz="Ережелерді үйренеді, бірақ сөйлесуге ұялады. Тілде тірі қарым-қатынас жоқ."></p>

    if (text) el.innerHTML = text;
  });
  // Update select options
  document.querySelectorAll('select option[data-ru]').forEach(opt => {
    const text = opt.getAttribute('data-' + lang);
    if (text) opt.textContent = text;
  });

  document.querySelectorAll('.lang-btns button').forEach((btn, i) => {
    btn.classList.toggle('active', (i === 0 && lang === 'ru') || (i === 1 && lang === 'kz'));

}

  item.classList.toggle('open');
}
